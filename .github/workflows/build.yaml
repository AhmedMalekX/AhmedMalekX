name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Update stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python update_stats.py
      - name: Commit
        run: |-
          git add dark_mode.svg light_mode.svg cache/
          git config --global user.email "github-actions-bot@ahmedmalekx.github.io"
          git config --global user.name "AhmedMalekX/GitHub-Actions-Bot"
          git commit -m "Update stats" -a || echo "No changes to commit"
          git push
